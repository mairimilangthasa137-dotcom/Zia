<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zia Birthday</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #text-container {
            max-width: 600px;
            width: 100%;
            margin-top: 40px;
            text-align: left;
        }
        h1 {
            color: #ff4757;
            min-height: 1.2em;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p {
            font-size: 1.2rem;
            color: #ced4da;
            min-height: 1.2em;
            margin: 0;
        }
        
        /* Styles for the birthday card and final photo alignment */
        #birthday-card {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-family: sans-serif; 
            background: rgba(0,0,0,0.9); 
            padding: 25px; 
            border-radius: 15px; 
            opacity: 0; 
            transition: opacity 1.5s ease; 
            pointer-events: none; 
            z-index: 10000; 
            max-width: 85vw; 
            max-height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }
        #birthday-text {
            font-size: 20px; 
            text-align: center; 
            color: #fff; 
            line-height: 1.6;
            margin-bottom: 20px;
        }
        #couple-photo {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="text-container">
        <h1 id="headline"></h1>
        <p id="subtext"></p>
    </div>

    <div id="mc-hearts" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;overflow:hidden;"></div>
    <canvas id="riceball-canvas" style="position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:9998;"></canvas>
    
    <!-- Combined text box and photo frame container -->
    <div id="birthday-card">
        <div id="birthday-text"></div>
        <!-- Change "our-photo.jpg" to match your exact uploaded file name -->
        <img id="couple-photo" src="our-photo.jpg" alt="Us">
    </div>

    <script>
    (function() {
        // --- 1. Typewriter Animation ---
        const text1 = "omg! who this in my block?";
        const text2 = "damn right! dats my handsome sweet birthday boy zia, silly me";

        let index1 = 0;
        let index2 = 0;

        function typeHeadline() {
            if (index1 < text1.length) {
                document.getElementById("headline").innerHTML += text1.charAt(index1);
                index1++;
                setTimeout(typeHeadline, 100);
            } else {
                setTimeout(typeSubtext, 500);
            }
        }

        function typeSubtext() {
            if (index2 < text2.length) {
                document.getElementById("subtext").innerHTML += text2.charAt(index2);
                index2++;
                setTimeout(typeSubtext, 80);
            }
        }

        // --- 2. Floating Pixel Hearts Animation ---
        const container = document.getElementById('mc-hearts');
        const svg = `data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 7 6"><path d="M1,0h1v1h-1zM5,0h1v1h-1zM0,1h3v1h-3zM4,1h3v1h-3zM0,2h7v1h-7zM1,3h5v1h-5zM2,4h3v1h-3zM3,5h1v1h-1z" fill="%23ffcbd5"/></svg>`;
        
        setInterval(() => {
            const heart = document.createElement('div');
            heart.style.cssText = `position:absolute;width:16px;height:14px;background:url('${svg}') no-repeat;background-size:contain;left:${Math.random()*100}vw;bottom:-20px;opacity:${Math.random()*0.4+0.4};transition:transform 4s linear,opacity 4s linear;image-rendering:pixelated;`;
            container.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = `translateY(-105vh) scale(${Math.random()*0.4+0.8})`;
                heart.style.opacity = '0';
            }, 50);
            setTimeout(() => heart.remove(), 4000);
        }, 500);

        // --- 3. Bouncing Onigiri Canvas Animation ---
        const canvas = document.getElementById('riceball-canvas');
        const ctx = canvas.getContext('2d');
        const cardDiv = document.getElementById('birthday-card');
        const textDiv = document.getElementById('birthday-text');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const onigiriImg = new Image();
        onigiriImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='32' height='32' viewBox='0 0 32 32' shape-rendering='crispEdges'><path d='M14 4h4v2h-4zM12 6h2v2h-2zm6 0h2v2h-2zM10 8h2v2h-2zm10 0h2v2h-2zM8 10h2v2H8zm14 0h2v2h-2zM6 12h2v2H6zm18 0h2v2h-2zM4 14h2v14H4zm24 0h2v14h-2zM6 26h22v2H6z' fill='%23ffffff'/><path d='M14 6h4v2h-4zM12 8h2v2h-2zm6 0h2v2h-2zM10 10h2v2h-2zm10 0h2v2h-2zM8 12h2v14H8zm14 0h2v14h-2zM10 14h12v12H10z' fill='%23f0f0f0'/><path d='M12 20h8v6h-8z' fill='%23222222'/></svg>";

        let x = -50; 
        let y = canvas.height * 0.3; 
        let vx = 4; 
        let vy = 0; 
        const gravity = 0.2; 
        let animationStage = 'forward'; 

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (animationStage === 'forward') {
                x += vx;
                if (x > canvas.width * 0.4) {
                    animationStage = 'falling';
                }
            } else if (animationStage === 'falling') {
                x += vx * 0.5;
                vy += gravity;
                y += vy;
                
                if (y > canvas.height + 50) {
                    animationStage = 'done';
                    showCard();
                }
            }

            if (animationStage !== 'done') {
                ctx.drawImage(onigiriImg, x, y, 64, 64);
                requestAnimationFrame(animate);
            }
        }

        function showCard() {
            textDiv.innerHTML = `hello my sweet big baby, loml, my hubby, world’s best bf, all time chef, big dih, and my personal favourite caretaker XD. first of all, happy birthday to my fav person, you are 22 now yayyyy my baby is getting bigger, i wish you prosper in your life in everything you do! good health, wealth, not only you but i wish every good fortune to step at your door and bump you with happiness and please love me too like you always do😛`;
            cardDiv.style.opacity = '1';
        }

        onigiriImg.onload = () => {
            setTimeout(animate, 1000); 
        };

        window.addEventListener('load', typeHeadline);
    })();
    </script>

</body>
</html>
